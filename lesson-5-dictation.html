<!DOCTYPE html>
<html lang="zh-CN" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Dictation – Lesson 5 (我是四川人？)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/lesson-layout.css">
    <script src="js/utils.js"></script>
    <script src="js/command-palette.js"></script>
    <script src="js/etymology-loader.js"></script>
    <script src="js/pinyin-utils.js"></script>
    <script src="js/engine/ai-service.js"></script>
    <script src="js/engine/chat.js"></script>
    <script src="js/quiz-engine.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-sync.js"></script>
    <script src="js/eeg-bridge.js"></script>
    <script src="js/eeg-neuro.js"></script>
    <script src="js/eeg-decision.js"></script>
</head>
<body class="experimental-layout">
    <a href="home.html" class="home-btn">← Home</a>

    <div class="app-container">
        <aside class="sidebar">
            <h2>Dictation Modes</h2>
            <p class="mode-desc">Hear a line, type the pinyin or meaning. Enter submits instantly; Space replays audio.</p>
            <nav>
                <button class="mode-btn" data-mode="audio-to-pinyin">Audio → Pinyin</button>
                <button class="mode-btn" data-mode="char-to-pinyin">Text → Pinyin</button>
                <button class="mode-btn" data-mode="audio-to-meaning">Audio → Meaning</button>
                <button class="mode-btn" data-mode="blend">🔀 Blend</button>
                <button class="mode-btn" data-mode="blend-mc">🔀 Blend MC</button>
                <button class="mode-btn" data-mode="audio-to-meaning-chunks">Audio → Meaning (Chunks)</button>
                <button class="mode-btn" data-mode="text-to-meaning">Text → Meaning</button>
                <button class="mode-btn" data-mode="text-to-meaning-chunks">Text → Meaning (Chunks)</button>
                <button class="mode-btn" data-mode="dictation-chat">AI Chat</button>
                <button class="mode-btn" data-mode="study">Study Mode</button>
            </nav>
        </aside>

        <main class="main-content">
            <header class="quiz-header">
                <h1>Dictation: Lesson 5 我是四川人？</h1>
            </header>

            <section class="quiz-display">
                <div id="questionDisplay"></div>

                <div id="upcomingCharacters" class="hidden" style="margin-top: 1rem;">
                    <div class="preview-list" style="display: flex; justify-content: center; gap: 1rem; font-size: 2rem; color: #d1d5db;"></div>
                    <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #9ca3af; margin-top: 0.5rem;">Upcoming</div>
                </div>

                <div id="hint" style="font-size: 1.25rem; font-weight: 600; margin: 0.75rem 0;"></div>

                <div id="audioSection" class="hidden" style="margin: 1rem 0;">
                    <button id="playAudioBtn">🔊 Play Sentence</button>
                </div>
            </section>

            <section class="input-section">
                <div id="typeMode">
                    <input type="text" id="answerInput" placeholder="Type your answer...">
                    <button id="checkBtn" style="display: none;">Check Answer</button>
                </div>

                <div id="choiceMode">
                    <div id="options" class="choice-grid"></div>
                </div>

                <div id="fuzzyMode">
                    <input type="text" id="fuzzyInput" placeholder="Type your answer...">
                    <div id="fuzzyOptions" class="choice-grid" style="margin-top: 0.75rem;"></div>
                </div>

                <div id="studyMode">
                    <div style="text-align: center; color: #6b7280; margin-bottom: 1rem;">Click the speaker to replay any line. Use Study Mode to preview before dictation.</div>
                    <div id="studyList" style="max-height: 420px; overflow-y: auto;"></div>
                </div>

                <div id="feedback"></div>
            </section>

            <footer class="stats-bar" id="stats">
                <div>Score: <span id="score">0</span>/<span id="total">0</span></div>
                <div id="timerDisplay"></div>
                <div>Accuracy: <span id="accuracy">0%</span></div>
            </footer>
        </main>
    </div>

    <script>
        const dictationSentences = [
            { char: '妈，今天上中文课，老师问我有没有中文名字，我说我的中文名字叫陈美生。', pinyin: 'mā, jīntiān shàng Zhōngwén kè, lǎoshī wèn wǒ yǒu méiyǒu Zhōngwén míng.zi, wǒ shuō wǒ.de Zhōngwén míng.zi jiào Chén Měishēng', meaning: 'Mom, today in Chinese class, the teacher asked me if I have a Chinese name. I said my Chinese name is Chen Meisheng.' },
            { char: '是啊！你的中文名字是叫陈美生啊。', pinyin: 'shì .a! nǐ.de Zhōngwén míng.zi shì jiào Chén Měishēng .a', meaning: 'That\'s right! Your Chinese name is Chen Meisheng.' },
            { char: '老师又问我，"美生"是哪两个字，怎么写的，我就回答不出来了，真不好意思。', pinyin: 'lǎoshī yòu wèn wǒ, "Měishēng" shì nǎ liǎng.ge zì, zěn.me xiě.de, wǒ jiù huídá.bu.chū.lái .le, zhēn bùhǎoyì.si', meaning: 'The teacher asked me again, what are the two characters for "Meisheng" and how to write them. I couldn\'t answer, so embarrassing.' },
            { char: '唉，"美"就是"美国"的美，"生"就是"出生"的生。', pinyin: 'āi, "měi" jiù.shì "Měiguó" .de měi, "shēng" jiù.shì "chūshēng" .de shēng', meaning: 'Oh, "mei" is the "mei" from "America", "sheng" is the "sheng" from "be born".' },
            { char: '因为你是在美国出生的，所以我们给你起了这个名字。', pinyin: 'yīn.wèi nǐ shì zài Měiguó chūshēng .de, suǒ.yǐ wǒ.men gěi nǐ qǐ.le zhè.ge míng.zi', meaning: 'Because you were born in America, so we gave you this name.' },
            { char: '妈，我们是哪儿人呢？', pinyin: 'mā, wǒ.men shì nǎr rén .ne', meaning: 'Mom, where are we from?' },
            { char: '你爸爸是四川人，妈是广东人。', pinyin: 'nǐ bà.ba shì Sìchuān rén, mā shì Guǎngdōng rén', meaning: 'Your dad is from Sichuan, mom is from Guangdong.' },
            { char: '那么，照中国人的说法，我是哪儿人呢？', pinyin: 'nà.me, zhào Zhōngguó rén .de shuō.fa, wǒ shì nǎr rén .ne', meaning: 'So, according to Chinese custom, where am I from?' },
            { char: '照我们中国人的说法，爸爸是哪儿人，孩子就是哪儿人。', pinyin: 'zhào wǒ.men Zhōngguó rén .de shuō.fa, bà.ba shì nǎr rén, hái.zi jiù.shì nǎr rén', meaning: 'According to Chinese custom, wherever the father is from, that\'s where the child is from.' },
            { char: '所以你也是四川人。', pinyin: 'suǒ.yǐ nǐ yě shì Sìchuān rén', meaning: 'So you are also from Sichuan.' },
            { char: '妈，我连四川在哪儿都不知道，我怎么能算是四川人呢？', pinyin: 'mā, wǒ lián Sìchuān zài nǎr dōu bù zhīdào, wǒ zěn.me néng suàn.shì Sìchuān rén .ne', meaning: 'Mom, I don\'t even know where Sichuan is, how can I be considered from Sichuan?' },
            { char: '其实，我也没去过广东，也不会说广东话，不过我还是说我是广东人。', pinyin: 'qíshí, wǒ yě méi qù.guò Guǎngdōng, yě bù huì shuō Guǎngdōng huà, búguò wǒ háishi shuō wǒ shì Guǎngdōng rén', meaning: 'Actually, I\'ve never been to Guangdong either, and I can\'t speak Cantonese, but I still say I\'m from Guangdong.' },
            { char: '妈，不能跟您多说了，还有一个电话要进来，我明天再给您打电话吧。', pinyin: 'mā, bù néng gēn nín duō shuō .le, hái.yǒu yī.ge diànhuà yào jìn.lái, wǒ míngtiān zài gěi nín dǎ diànhuà .ba', meaning: 'Mom, I can\'t talk much longer, I have another call coming in. I\'ll call you again tomorrow.' },
            { char: '好吧，好吧，你的电话真多。', pinyin: 'hǎo.ba, hǎo.ba, nǐ.de diànhuà zhēn duō', meaning: 'Okay, okay, you really have a lot of calls.' }
        ];

        const paletteItems = [
            { name: 'Dictation: Audio → Pinyin', mode: 'audio-to-pinyin', type: 'mode' },
            { name: 'Dictation: Text → Pinyin', mode: 'char-to-pinyin', type: 'mode' },
            { name: 'Dictation: Audio → Meaning', mode: 'audio-to-meaning', type: 'mode' },
            { name: 'Dictation: Audio → Meaning (Chunks)', mode: 'audio-to-meaning-chunks', type: 'mode' },
            { name: 'Dictation: Text → Meaning', mode: 'text-to-meaning', type: 'mode' },
            { name: 'Dictation: Text → Meaning (Chunks)', mode: 'text-to-meaning-chunks', type: 'mode' },
            { name: 'Dictation: AI Chat', mode: 'dictation-chat', type: 'mode' },
            { name: 'Dictation: Study Mode', mode: 'study', type: 'mode' }
        ];

        initQuiz(dictationSentences, {
            defaultMode: 'audio-to-meaning',
            commandPaletteItems: paletteItems
        });
    </script>
</body>
</html>
