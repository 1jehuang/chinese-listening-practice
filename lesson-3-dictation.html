<!DOCTYPE html>
<html lang="zh-CN" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Dictation – Lesson 3 (我们都是美国人)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/lesson-layout.css">
    <script src="js/utils.js"></script>
    <script src="js/command-palette.js"></script>
    <script src="js/etymology-loader.js"></script>
    <script src="js/pinyin-utils.js"></script>
    <script src="js/engine/ai-service.js"></script>
    <script src="js/engine/chat.js"></script>
    <script src="js/quiz-engine.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-sync.js"></script>
    <script src="js/eeg-bridge.js"></script>
    <script src="js/eeg-neuro.js"></script>
    <script src="js/eeg-decision.js"></script>
</head>
<body class="experimental-layout">
    <a href="home.html" class="home-btn">← Home</a>

    <div class="app-container">
        <aside class="sidebar">
            <h2>Dictation Modes</h2>
            <p class="mode-desc">Hear a line, type the pinyin or meaning. Enter submits instantly; Space replays audio.</p>
            <nav>
                <button class="mode-btn" data-mode="audio-to-pinyin">Audio → Pinyin</button>
                <button class="mode-btn" data-mode="char-to-pinyin">Text → Pinyin</button>
                <button class="mode-btn" data-mode="audio-to-meaning">Audio → Meaning</button>
                <button class="mode-btn" data-mode="blend">🔀 Blend</button>
                <button class="mode-btn" data-mode="blend-mc">🔀 Blend MC</button>
                <button class="mode-btn" data-mode="audio-to-meaning-chunks">Audio → Meaning (Chunks)</button>
                <button class="mode-btn" data-mode="text-to-meaning">Text → Meaning</button>
                <button class="mode-btn" data-mode="text-to-meaning-chunks">Text → Meaning (Chunks)</button>
                <button class="mode-btn" data-mode="dictation-chat">AI Chat</button>
                <button class="mode-btn" data-mode="study">Study Mode</button>
            </nav>
        </aside>

        <main class="main-content">
            <header class="quiz-header">
                <h1>Dictation: Lesson 3 我们都是美国人</h1>
            </header>

            <section class="quiz-display">
                <div id="questionDisplay"></div>

                <div id="upcomingCharacters" class="hidden" style="margin-top: 1rem;">
                    <div class="preview-list" style="display: flex; justify-content: center; gap: 1rem; font-size: 2rem; color: #d1d5db;"></div>
                    <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #9ca3af; margin-top: 0.5rem;">Upcoming</div>
                </div>

                <div id="hint" style="font-size: 1.25rem; font-weight: 600; margin: 0.75rem 0;"></div>

                <div id="audioSection" class="hidden" style="margin: 1rem 0;">
                    <button id="playAudioBtn">🔊 Play Sentence</button>
                </div>
            </section>

            <section class="input-section">
                <div id="typeMode">
                    <input type="text" id="answerInput" placeholder="Type your answer...">
                    <button id="checkBtn" style="display: none;">Check Answer</button>
                </div>

                <div id="choiceMode">
                    <div id="options" class="choice-grid"></div>
                </div>

                <div id="fuzzyMode">
                    <input type="text" id="fuzzyInput" placeholder="Type your answer...">
                    <div id="fuzzyOptions" class="choice-grid" style="margin-top: 0.75rem;"></div>
                </div>

                <div id="studyMode">
                    <div style="text-align: center; color: #6b7280; margin-bottom: 1rem;">Click the speaker to replay any line. Use Study Mode to preview before dictation.</div>
                    <div id="studyList" style="max-height: 420px; overflow-y: auto;"></div>
                </div>

                <div id="feedback"></div>
            </section>

            <footer class="stats-bar" id="stats">
                <div>Score: <span id="score">0</span>/<span id="total">0</span></div>
                <div id="timerDisplay"></div>
                <div>Accuracy: <span id="accuracy">0%</span></div>
            </footer>
        </main>
    </div>

    <script>
        const dictationSentences = [
            { char: '你是从哪儿来的吗？', pinyin: 'nǐ shì cóng nǎr lái.de ma', meaning: 'Where are you from?' },
            { char: '我是从德州来的。', pinyin: 'wǒ shì cóng Dézhōu lái.de', meaning: 'I am from Texas.' },
            { char: '从德州来的？你怎么有起来像个中国人呢？', pinyin: 'cóng Dézhōu lái.de? nǐ zěn.me yǒu qǐ.lái xiàng.ge Zhōngguó rén ne', meaning: 'From Texas? How come you look like a Chinese person?' },
            { char: '这是什么意思？我跟你一样都是美国人呀。', pinyin: 'zhè shì shén.me yì.si? wǒ gēn nǐ yī.yàng dōu shì Měiguó rén .a', meaning: 'What does that mean? I, like you, am an American.' },
            { char: '可是，我真看不出来你是美国人。', pinyin: 'kě.shì, wǒ zhēn kàn.bu.chū.lái nǐ shì Měiguó rén', meaning: 'But I really can\'t tell that you are American.' },
            { char: '你觉得什么样的人才是美国人呢？', pinyin: 'nǐ jué.de shén.me yàng.de rén cái shì Měiguó rén .ne', meaning: 'What kind of person do you think is American?' },
            { char: '我想美国人都是……都是……', pinyin: 'wǒ xiǎng Měiguó rén dōu shì... dōu shì...', meaning: 'I think Americans are all... are all...' },
            { char: '都是什么？', pinyin: 'dōu shì shén.me', meaning: 'Are all what?' },
            { char: '都是……都是……', pinyin: 'dōu shì... dōu shì...', meaning: 'Are all... are all...' },
            { char: '都是黄头发的，蓝眼睛的吗？', pinyin: 'dōu shì huáng tóu.fa .de, lán yǎn.jing .de .ma', meaning: 'All have yellow hair and blue eyes?' },
            { char: '不一定，不一定。', pinyin: 'bù.yī.dìng, bù.yī.dìng', meaning: 'Not necessarily, not necessarily.' },
            { char: '中国人头发和眼睛都是黑的，但是有黑头发、黑眼睛的却不一定都是中国人。', pinyin: 'Zhōngguó rén tóu.fa hé yǎn.jing dōu shì hēi.de, dàn.shì yǒu hēi tóu.fa, hēi yǎn.jing .de què bù.yī.dìng dōu shì Zhōngguó rén', meaning: 'Chinese people have black hair and eyes, but those with black hair and black eyes are not necessarily all Chinese.' },
            { char: '对，日本人也是黑头发黑眼睛。', pinyin: 'duì, Rìběn rén yě.shì hēi tóu.fa hēi yǎn.jing', meaning: 'Right, Japanese people also have black hair and black eyes.' },
            { char: '那么美国人是什么样的呢？', pinyin: 'nà.me Měiguó rén shì shén.me yàng.de ne', meaning: 'So what are Americans like?' },
            { char: '什么人都可以是美国人，所以有的美国人是白人，有的是黑人，有的是黄种人。', pinyin: 'shén.me rén dōu kě.yǐ shì Měiguó rén, suǒ.yǐ yǒu.de Měiguó rén shì bái rén, yǒu.de shì hēi rén, yǒu.de shì huáng.zhǒng.rén', meaning: 'Anyone can be American, so some Americans are Caucasian, some are African American, some are Asian American.' },
            { char: '欧洲人可以是美国人，非洲人也可以是美国人，亚洲人也可以是美国人。', pinyin: 'Ōuzhōu rén kě.yǐ shì Měiguó rén, Fēizhōu rén yě kě.yǐ shì Měiguó rén, Yàzhōu rén yě kě.yǐ shì Měiguó rén', meaning: 'Europeans can be American, Africans can also be American, Asians can also be American.' },
            { char: '对了，一个人只要生在美国就是美国人。', pinyin: 'duì.le, yī.ge rén zhǐ.yào shēng zài Měiguó jiù.shì Měiguó rén', meaning: 'That\'s right, as long as a person is born in America, they are American.' },
            { char: '但是，美国人却不一定都得生在美国。', pinyin: 'dàn.shì, Měiguó rén què bù.yī.dìng dōu děi shēng zài Měiguó', meaning: 'But Americans don\'t necessarily all have to be born in America.' },
            { char: '所以我们都是美国人。', pinyin: 'suǒ.yǐ wǒ.men dōu shì Měiguó rén', meaning: 'So we are all Americans.' }
        ];

        const paletteItems = [
            { name: 'Dictation: Audio → Pinyin', mode: 'audio-to-pinyin', type: 'mode' },
            { name: 'Dictation: Text → Pinyin', mode: 'char-to-pinyin', type: 'mode' },
            { name: 'Dictation: Audio → Meaning', mode: 'audio-to-meaning', type: 'mode' },
            { name: 'Dictation: Audio → Meaning (Chunks)', mode: 'audio-to-meaning-chunks', type: 'mode' },
            { name: 'Dictation: Text → Meaning', mode: 'text-to-meaning', type: 'mode' },
            { name: 'Dictation: Text → Meaning (Chunks)', mode: 'text-to-meaning-chunks', type: 'mode' },
            { name: 'Dictation: AI Chat', mode: 'dictation-chat', type: 'mode' },
            { name: 'Dictation: Study Mode', mode: 'study', type: 'mode' }
        ];

        initQuiz(dictationSentences, {
            defaultMode: 'audio-to-meaning',
            commandPaletteItems: paletteItems
        });
    </script>
</body>
</html>
