<!DOCTYPE html>
<html lang="zh-CN" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Dictation – Lesson 6 (别担心)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/lesson-layout.css">
    <script src="js/utils.js"></script>
    <script src="js/command-palette.js"></script>
    <script src="js/etymology-loader.js"></script>
    <script src="js/pinyin-utils.js"></script>
    <script src="js/engine/ai-service.js"></script>
    <script src="js/engine/chat.js"></script>
    <script src="js/quiz-engine.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-sync.js"></script>
    <script src="js/eeg-bridge.js"></script>
    <script src="js/eeg-neuro.js"></script>
    <script src="js/eeg-decision.js"></script>
</head>
<body class="experimental-layout">
    <a href="home.html" class="home-btn">← Home</a>

    <div class="app-container">
        <aside class="sidebar">
            <h2>Dictation Modes</h2>
            <p class="mode-desc">Hear a line, type the pinyin or meaning. Enter submits instantly; Space replays audio.</p>
            <nav>
                <button class="mode-btn" data-mode="audio-to-pinyin">Audio → Pinyin</button>
                <button class="mode-btn" data-mode="char-to-pinyin">Text → Pinyin</button>
                <button class="mode-btn" data-mode="audio-to-meaning">Audio → Meaning</button>
                <button class="mode-btn" data-mode="blend">🔀 Blend</button>
                <button class="mode-btn" data-mode="blend-mc">🔀 Blend MC</button>
                <button class="mode-btn" data-mode="audio-to-meaning-chunks">Audio → Meaning (Chunks)</button>
                <button class="mode-btn" data-mode="text-to-meaning">Text → Meaning</button>
                <button class="mode-btn" data-mode="text-to-meaning-chunks">Text → Meaning (Chunks)</button>
                <button class="mode-btn" data-mode="dictation-chat">AI Chat</button>
                <button class="mode-btn" data-mode="study">Study Mode</button>
            </nav>
        </aside>

        <main class="main-content">
            <header class="quiz-header">
                <h1>Dictation: Lesson 6 别担心</h1>
            </header>

            <section class="quiz-display">
                <div id="questionDisplay"></div>

                <div id="upcomingCharacters" class="hidden" style="margin-top: 1rem;">
                    <div class="preview-list" style="display: flex; justify-content: center; gap: 1rem; font-size: 2rem; color: #d1d5db;"></div>
                    <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #9ca3af; margin-top: 0.5rem;">Upcoming</div>
                </div>

                <div id="hint" style="font-size: 1.25rem; font-weight: 600; margin: 0.75rem 0;"></div>

                <div id="audioSection" class="hidden" style="margin: 1rem 0;">
                    <button id="playAudioBtn">🔊 Play Sentence</button>
                </div>
            </section>

            <section class="input-section">
                <div id="typeMode">
                    <input type="text" id="answerInput" placeholder="Type your answer...">
                    <button id="checkBtn" style="display: none;">Check Answer</button>
                </div>

                <div id="choiceMode">
                    <div id="options" class="choice-grid"></div>
                </div>

                <div id="fuzzyMode">
                    <input type="text" id="fuzzyInput" placeholder="Type your answer...">
                    <div id="fuzzyOptions" class="choice-grid" style="margin-top: 0.75rem;"></div>
                </div>

                <div id="studyMode">
                    <div style="text-align: center; color: #6b7280; margin-bottom: 1rem;">Click the speaker to replay any line. Use Study Mode to preview before dictation.</div>
                    <div id="studyList" style="max-height: 420px; overflow-y: auto;"></div>
                </div>

                <div id="feedback"></div>
            </section>

            <footer class="stats-bar" id="stats">
                <div>Score: <span id="score">0</span>/<span id="total">0</span></div>
                <div id="timerDisplay"></div>
                <div>Accuracy: <span id="accuracy">0%</span></div>
            </footer>
        </main>
    </div>

    <script>
        const dictationSentences = [
            { char: '（电话铃声，电话录音…"我是陈美生，现在不在屋子里，没法接您的电话，请您留下姓名和电话号码，我一回来就给您回电话。"）', pinyin: '(diànhuà língshēng, diànhuà lùyīn…"wǒ shì Chén Měishēng, xiànzài bù zài wū.zi lǐ, méi fǎ jiē nín.de diànhuà, qǐng nín liú.xià xìngmíng hé diànhuà hàomǎ, wǒ yí huílái jiù gěi nín huí diànhuà.")', meaning: 'Phone rings and the voicemail says, "This is Chen Meisheng... please leave your name and number, I will call back as soon as I return."' },
            { char: '妈：你看，都快十二点了，美生还不在屋子里，不知道整天在忙些什么。', pinyin: 'mā: nǐ kàn, dōu kuài shí\'èr diǎn .le, Měishēng hái bú zài wū.zi lǐ, bù zhīdao zhěngtiān zài máng xiē shén.me', meaning: 'Mom: Look, it\'s almost midnight and Meisheng still isn\'t home; I don\'t know what she\'s busy with all day.' },
            { char: '父：下次你问问她是不是有男朋友了。', pinyin: 'fù: xià.ci nǐ wèn.wen tā shì.bu.shì yǒu nánpéng.you .le', meaning: 'Dad: Next time ask her whether she has a boyfriend.' },
            { char: '母：我问过她几次了，她都说没有。', pinyin: 'mǔ: wǒ wèn.guò tā jǐ.ci .le, tā dōu shuō méi.yǒu', meaning: 'Mom: I\'ve asked her several times, she always says no.' },
            { char: '父：我才不信呢！上次回家住了两天，有个男的一天打了好几次电话给她。', pinyin: 'fù: wǒ cái bù xìn ne! shàng.ci huíjiā zhù .le liǎng tiān, yǒu .ge nán.de yì tiān dǎ.le hǎo jǐ.ci diànhuà gěi tā', meaning: 'Dad: I don\'t believe it! Last time she was home for two days, some guy called her many times in a single day.' },
            { char: '母：我知道。她说只是同学，不是男朋友。', pinyin: 'mǔ: wǒ zhīdao. tā shuō zhǐ.shì tóngxué, bú.shì nánpéng.you', meaning: 'Mom: I know. She said he\'s just a classmate, not a boyfriend.' },
            { char: '父：男同学也好，男朋友也好，都是她自己的事，何必为她操心呢？', pinyin: 'fù: nán tóngxué yě hǎo, nánpéng.you yě hǎo, dōu shì tā zìjǐ .de shì, hébì wéi tā cāoxīn .ne', meaning: 'Dad: Classmate or boyfriend, it\'s her own business—why worry about it for her?' },
            { char: '母：别的我倒不担心，就是担心她怀孕，怀了孕还怎么念书呢？', pinyin: 'mǔ: bié.de wǒ dào bù dānxīn, jiù.shì dānxīn tā huáiyùn, huái .le yùn hái zěn.me niànshū .ne', meaning: 'Mom: I\'m not worried about other things, just that she might get pregnant—how would she keep studying then?' },
            { char: '父：放心吧！他们懂的比我们多多了。现在连中学生都会避孕，难道他们还不会吗？', pinyin: 'fù: fàngxīn .ba! tā.men dǒng .de bǐ wǒ.men duōduō .le. xiànzài lián Zhōngxuéshēng dōu huì bìyùn, nándào tā.men hái bù huì .ma', meaning: 'Dad: Relax! They understand way more than we do. Even high-schoolers know how to use birth control—do you mean they still wouldn\'t?' },
            { char: '母：我还担心她要是嫁个外国人，那可怎么办啊？', pinyin: 'mǔ: wǒ hái dānxīn tā yàoshi jià .ge wài.guórén, nà kě zěn.me bàn a', meaning: 'Mom: I still worry that if she marries a foreigner, what will we do?' },
            { char: '父："嫁个外国人？"在美国，谁是外国人啊！别——担——心——。', pinyin: 'fù: "jià .ge wài.guórén?" zài Měiguó, shéi .shi wài.guórén .a! bié---dān---xīn---', meaning: 'Dad: "Marry a foreigner?" In America, who counts as a foreigner? Don\'t—worry—about—it.' }
        ];

        const paletteItems = [
            { name: 'Dictation: Audio → Pinyin', mode: 'audio-to-pinyin', type: 'mode' },
            { name: 'Dictation: Text → Pinyin', mode: 'char-to-pinyin', type: 'mode' },
            { name: 'Dictation: Audio → Meaning', mode: 'audio-to-meaning', type: 'mode' },
            { name: 'Dictation: Audio → Meaning (Chunks)', mode: 'audio-to-meaning-chunks', type: 'mode' },
            { name: 'Dictation: Text → Meaning', mode: 'text-to-meaning', type: 'mode' },
            { name: 'Dictation: Text → Meaning (Chunks)', mode: 'text-to-meaning-chunks', type: 'mode' },
            { name: 'Dictation: AI Chat', mode: 'dictation-chat', type: 'mode' },
            { name: 'Dictation: Study Mode', mode: 'study', type: 'mode' }
        ];

        initQuiz(dictationSentences, {
            defaultMode: 'audio-to-meaning',
            commandPaletteItems: paletteItems
        });
    </script>
</body>
</html>
