<!DOCTYPE html>
<html lang="zh-CN" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Lesson 3 Part 1: We Are All Americans - Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <link rel="stylesheet" href="css/common.css">
    <script src="js/utils.js"></script>
    <script src="js/command-palette.js"></script>
    <script src="js/etymology-loader.js"></script>
    <script src="js/pinyin-utils.js"></script>
    <script src="js/engine/ai-service.js"></script>
    <script src="js/engine/chat.js"></script>
    <script src="js/quiz-engine.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-sync.js"></script>
    <script src="js/eeg-bridge.js"></script>
    <script src="js/eeg-neuro.js"></script>
    <script src="js/eeg-decision.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <a href="home.html" class="fixed top-4 left-4 bg-white hover:bg-gray-100 text-gray-700 px-3 py-2 rounded-lg shadow border border-gray-200 transition text-sm z-50">← Home</a>

        <div class="flex min-h-screen">
        <!-- Mode Selector Sidebar -->
        <div class="w-64 bg-white shadow-lg p-4 overflow-y-auto">
            <h2 class="text-lg font-bold text-gray-800 mb-4 mt-12">Quiz Modes</h2>
            <div class="flex flex-col gap-2">
                <button class="mode-btn px-3 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition text-left text-sm" data-mode="char-to-pinyin-type">Char → Pinyin (MC)</button>
                <button class="mode-btn px-3 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition text-left text-sm" data-mode="char-to-pinyin-tones-mc">Char → Pinyin (Tones MC)</button>
                <button class="mode-btn px-3 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition active:bg-blue-500 active:text-white active:border-blue-500 text-left text-sm" data-mode="char-to-pinyin">Char → Pinyin</button>
                <button class="mode-btn px-3 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition text-left text-sm" data-mode="char-to-tones">Char → Tones</button>
                <button class="mode-btn px-3 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition text-left text-sm" data-mode="audio-to-pinyin">Audio → Pinyin</button>
                <button class="mode-btn px-3 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition text-left text-sm" data-mode="pinyin-to-char">Pinyin → Char</button>
                <button class="mode-btn px-3 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition text-left text-sm" data-mode="char-to-meaning-type">Char → Meaning</button>
                <button class="mode-btn px-3 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition text-left text-sm" data-mode="audio-to-meaning">Audio → Meaning</button>
                <button class="mode-btn px-3 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition text-left text-sm" data-mode="meaning-to-char">Meaning → Char</button>
                <button class="mode-btn px-3 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition text-left text-sm" data-mode="blend">🔀 Blend</button>
                <button class="mode-btn px-3 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition text-left text-sm" data-mode="stroke-order">Stroke Order</button>
                <button class="mode-btn px-3 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition text-left text-sm" data-mode="handwriting">Handwriting</button>
                <button class="mode-btn px-3 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition text-left text-sm" data-mode="draw-char">Draw Character</button>
                <button class="mode-btn px-3 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition text-left text-sm" data-mode="missing-component">Missing Component</button>
                <button class="mode-btn px-3 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition text-left text-sm" data-mode="char-building">Build Character</button>
                <button class="mode-btn px-3 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition text-left text-sm" data-mode="radical-practice">Radical Practice</button>
                <button class="mode-btn px-3 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition text-left text-sm" data-mode="study">Study Mode</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 p-4 md:p-8">
            <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-lg p-6 md:p-8">
                <h1 class="text-3xl font-bold text-center mb-6 text-gray-800">Lesson 3 Part 1: 我们都是美国人 (We Are All Americans)</h1>

        <!-- Upcoming Preview -->
        <div id="upcomingCharacters" class="hidden text-center mb-4">
            <div class="text-xs uppercase tracking-widest text-gray-400">Upcoming</div>
            <div class="preview-list flex justify-center gap-4 mt-2 text-4xl text-gray-300"></div>
        </div>

        <!-- Question Display -->
        <div id="questionDisplay" class="text-center"></div>

        <!-- Hint -->
        <div id="hint" class="text-center text-2xl font-semibold my-4"></div>

        <!-- Audio Section -->
        <div id="audioSection" class="text-center my-4 hidden">
            <button id="playAudioBtn" class="bg-cyan-500 hover:bg-cyan-600 text-white px-6 py-3 rounded-lg transition">🔊 Play Sound</button>
        </div>

        <!-- Type Mode -->
        <div id="typeMode" class="space-y-4">
            <input type="text" id="answerInput" class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none text-lg" placeholder="Type your answer...">
            <button id="checkBtn" class="w-full bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-lg font-semibold transition">Check Answer</button>
        </div>

        <!-- Choice Mode -->
        <div id="choiceMode" class="hidden">
            <div id="options" class="grid grid-cols-2 gap-3"></div>
        </div>

        <!-- Fuzzy Mode -->
        <div id="fuzzyMode" class="hidden space-y-4">
            <input type="text" id="fuzzyInput" class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none text-lg" placeholder="Type your answer...">
            <div id="fuzzyOptions" class="grid grid-cols-2 gap-3"></div>
        </div>

        <!-- Stroke Order Mode -->
        <div id="strokeOrderMode" class="hidden">
            <div id="strokeOrderWriter" class="flex justify-center my-8"></div>
        </div>

        <!-- Handwriting Mode -->
        <div id="handwritingMode" class="hidden">
            <div class="text-center text-gray-600 mb-4">Practice writing on paper, then reveal the answer</div>
            <div id="handwritingWriter" class="flex justify-center my-8"></div>
            <div class="flex justify-center gap-3">
                <button id="hwShowBtn" class="bg-blue-500 hover:bg-blue-600 text-white px-8 py-3 rounded-lg transition text-lg">Show Answer</button>
                <button id="hwNextBtn" class="bg-green-500 hover:bg-green-600 text-white px-8 py-3 rounded-lg transition text-lg">Next</button>
            </div>
                            <p id="hwSpaceHint" class="text-center text-sm text-gray-500 mt-2">Space: show → tap ✓ correct · hold ✗ wrong</p>
                </div>

        <!-- Draw Character Mode -->
        <div id="drawCharMode" class="hidden">
            <div class="text-center mb-4">
                <div id="ocrResult" class="text-6xl min-h-[80px] text-blue-600 font-bold"></div>
                <div class="text-sm text-gray-500">Real-time recognition</div>
            </div>
            <canvas id="drawCanvas" class="border-2 border-gray-300 rounded-lg mx-auto cursor-crosshair" width="300" height="300"></canvas>
            <div class="flex gap-3 justify-center mt-4">
                <button id="clearCanvasBtn" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-lg transition">🗑️ Clear</button>
                <button id="submitDrawBtn" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-lg transition">✓ Submit</button>
                <button id="fullscreenDrawBtn" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-lg transition">⛶ Fullscreen</button>
            </div>
        </div>

        <!-- Fullscreen Drawing Mode -->
        <div id="fullscreenDrawContainer" class="hidden fixed inset-0 bg-gray-100 z-50 flex flex-col">
            <div class="flex justify-between items-center p-4 bg-white shadow">
                <div class="text-2xl font-bold text-gray-700" id="fullscreenPrompt">Draw: </div>
                <div class="flex gap-2">
                    <button id="fullscreenUndoBtn" class="bg-gray-300 text-gray-500 px-4 py-2 rounded-lg transition cursor-not-allowed" disabled>↶ Undo</button>
                    <button id="fullscreenRedoBtn" class="bg-gray-300 text-gray-500 px-4 py-2 rounded-lg transition cursor-not-allowed" disabled>↷ Redo</button>
                    <button id="fullscreenClearBtn" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg transition">🗑️ Clear</button>
                    <button id="fullscreenSubmitBtn" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg transition">✓ Submit</button>
                    <button id="fullscreenShowAnswerBtn" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg transition">💡 Answer</button>
                    <button id="fullscreenNextBtn" class="bg-purple-500 hover:bg-purple-600 text-white px-4 py-2 rounded-lg transition">→ Next</button>
                    <button id="fullscreenLearnBtn" class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-2 rounded-lg transition">📚 Learn</button>
                    <button id="fullscreenLearnNextBtn" class="hidden bg-purple-500 hover:bg-purple-600 text-white px-4 py-2 rounded-lg transition">→ Next Char</button>
                    <button id="fullscreenLearnStopBtn" class="hidden bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg transition">■ Stop</button>
                    <button id="exitFullscreenBtn" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded-lg transition">✕ Exit</button>
                </div>
            </div>
            <div class="flex-1 flex items-center justify-center p-4">
                <div class="text-center w-full h-full flex flex-col items-center justify-center">
                    <div id="fullscreenOcrResult" class="text-7xl sm:text-8xl min-h-[100px] text-blue-600 font-bold mb-4"></div>
                    <canvas id="fullscreenDrawCanvas" class="border-4 border-gray-400 rounded-lg cursor-crosshair bg-white shadow-lg max-w-full max-h-full" style="aspect-ratio: 1/1;"></canvas>
                </div>
            </div>
        </div>

        <!-- Study Mode -->
        <div id="studyMode" class="hidden">
            <div class="text-center text-gray-600 mb-4">Study all vocabulary with audio</div>
            <div id="studyList" class="space-y-2 max-h-[600px] overflow-y-auto"></div>
        </div>

        <!-- Radical Practice Mode -->
        <div id="radicalPracticeMode" class="hidden">
            <div class="text-center text-gray-600 mb-4">Select all radicals in the character</div>
            <div id="radicalOptions" class="grid grid-cols-2 md:grid-cols-3 gap-3"></div>
            <div class="mt-4 text-center">
                <button id="radicalSubmitBtn" class="bg-green-500 hover:bg-green-600 text-white px-8 py-3 rounded-lg transition text-lg">Submit Answer</button>
            </div>
        </div>

        <!-- Missing Component Mode -->
        <div id="missingComponentMode" class="hidden">
            <input type="text" id="componentInput" placeholder="Type component pinyin..." class="w-full px-4 py-3 text-xl border-2 border-gray-300 rounded-lg text-center mb-4">
            <div id="componentOptions" class="grid grid-cols-2 gap-3"></div>
        </div>

        <!-- Character Building Mode -->
        <div id="charBuildingMode" class="hidden">
            <input type="text" id="charBuildingInput" placeholder="Type component pinyin..." class="w-full px-4 py-3 text-xl border-2 border-gray-300 rounded-lg text-center mb-4">
            <div id="charBuildingOptions" class="grid grid-cols-2 gap-3"></div>
        </div>

        <!-- Feedback -->
        <div id="feedback" class="text-center text-2xl font-semibold my-4 min-h-[24px]"></div>

        <!-- Stats -->
        <div id="stats" class="flex justify-between text-sm text-gray-600 pt-4 border-t border-gray-200">
            <span>Score: <span id="score" class="font-semibold">0</span>/<span id="total" class="font-semibold">0</span></span>
            <span>Accuracy: <span id="accuracy" class="font-semibold">0%</span></span>
            </div>
        </div>
    </div>
    <script>
        const characters = [
            // Page 32 vocabulary
            { char: '你', pinyin: 'nǐ', meaning: 'you', radicals: ['亻(person)', '尔 (you)'] },
            { char: '从…来', pinyin: 'cóng...lái', meaning: 'come from', radicals: ['从 (follow)', '来 (come)'] },
            { char: '来', pinyin: 'lái', meaning: 'come', radicals: ['木 (wood)', '人 (person)'] },
            { char: '德州', pinyin: 'Dézhōu', meaning: 'Texas', radicals: ['彳 (step)', '十 (ten)', '目 (eye)', '一 (one)', '心 (heart)', '川 (river)'] },
            { char: '看起来', pinyin: 'kàn.qi.lái', meaning: 'look like, seem', radicals: ['手 (hand)', '目 (eye)', '己 (self)', '走 (walk)'] },
            // Page 33 vocabulary
            { char: '像', pinyin: 'xiàng', meaning: 'resemble', radicals: ['亻(person)', '象 (elephant)'] },
            { char: '跟', pinyin: 'gēn', meaning: 'and', radicals: ['足 (foot)', '艮 (stubborn)'] },
            { char: '啊', pinyin: '.a', meaning: 'particle showing obviousness', radicals: ['口 (mouth)', '阿 (prefix)'] },
            { char: '真', pinyin: 'zhēn', meaning: 'really', radicals: ['十 (ten)', '目 (eye)', '八 (eight)', '一 (one)'] },
            { char: '看不出来', pinyin: 'kàn.bù.chū.lái', meaning: "can't figure out by looking; can't tell", radicals: ['手 (hand)', '目 (eye)', '不 (not)', '出 (exit)', '来 (come)'] },
            { char: '样', pinyin: 'yàng', meaning: 'kind; sort', radicals: ['木 (wood)', '羊 (sheep)'] },
            { char: '才', pinyin: 'cái', meaning: 'indicating contrast', radicals: ['扌(hand)', '丿 (slash)'] },
            { char: '想', pinyin: 'xiǎng', meaning: 'think', radicals: ['木 (wood)', '目 (eye)', '心 (heart)'] },
            { char: '黄', pinyin: 'huáng', meaning: 'yellow; brown', radicals: ['艹 (grass)', '由 (from)', '八 (eight)'] },
            { char: '头发', pinyin: 'tóu.fà', meaning: 'hair (on the human head)', radicals: ['头 (head)', '癶 (footsteps)', '又 (again)'] },
            { char: '蓝', pinyin: 'lán', meaning: 'blue', radicals: ['艹 (grass)', '监 (supervise)'] },
            { char: '眼睛', pinyin: 'yǎnjīng', meaning: 'eyes', radicals: ['目 (eye)', '艮 (stubborn)', '月 (moon)', '青 (blue/green)'] },
            { char: '吗', pinyin: '.ma', meaning: 'particle for simple questions', radicals: ['口 (mouth)', '马 (horse)'] },
            { char: '不一定', pinyin: 'bùyīdìng', meaning: 'not necessarily', radicals: ['不 (not)', '一 (one)', '宀 (roof)', '疋 (bolt of cloth)'] }
        ];

        // Initialize the quiz with the modular engine
        initQuiz(characters, {
            enablePreviewQueue: true,
            previewQueueSize: 4,
            previewElementId: 'upcomingCharacters',
            previewApplicableModes: ['char-to-meaning-type', 'char-to-meaning', 'audio-to-meaning', 'blend']
        });
    </script>
</body>
</html>
