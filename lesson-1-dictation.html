<!DOCTYPE html>
<html lang="zh-CN" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Dictation – Lesson 1 (两张地图)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/lesson-layout.css">
    <script src="js/utils.js"></script>
    <script src="js/command-palette.js"></script>
    <script src="js/etymology-loader.js"></script>
    <script src="js/pinyin-utils.js"></script>
    <script src="js/engine/ai-service.js"></script>
    <script src="js/engine/chat.js"></script>
    <script src="js/quiz-engine.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-sync.js"></script>
    <script src="js/eeg-bridge.js"></script>
    <script src="js/eeg-neuro.js"></script>
    <script src="js/eeg-decision.js"></script>
</head>
<body class="experimental-layout">
    <a href="home.html" class="home-btn">← Home</a>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <h2>Dictation Modes</h2>
            <p class="mode-desc">Hear a line, type the pinyin or meaning. Enter submits instantly; Space replays audio.</p>
            <nav>
                <button class="mode-btn" data-mode="audio-to-pinyin">Audio → Pinyin</button>
                <button class="mode-btn" data-mode="char-to-pinyin">Text → Pinyin</button>
                <button class="mode-btn" data-mode="audio-to-meaning">Audio → Meaning</button>
                <button class="mode-btn" data-mode="blend">🔀 Blend</button>
                <button class="mode-btn" data-mode="blend-mc">🔀 Blend MC</button>
                <button class="mode-btn" data-mode="audio-to-meaning-chunks">Audio → Meaning (Chunks)</button>
                <button class="mode-btn" data-mode="text-to-meaning">Text → Meaning</button>
                <button class="mode-btn" data-mode="text-to-meaning-chunks">Text → Meaning (Chunks)</button>
                <button class="mode-btn" data-mode="dictation-chat">AI Chat</button>
                <button class="mode-btn" data-mode="study">Study Mode</button>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="quiz-header">
                <h1>Dictation: Lesson 1 两张地图</h1>
            </header>

            <section class="quiz-display">
                <div id="questionDisplay"></div>

                <div id="upcomingCharacters" class="hidden" style="margin-top: 1rem;">
                    <div class="preview-list" style="display: flex; justify-content: center; gap: 1rem; font-size: 2rem; color: #d1d5db;"></div>
                    <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #9ca3af; margin-top: 0.5rem;">Upcoming</div>
                </div>

                <div id="hint" style="font-size: 1.25rem; font-weight: 600; margin: 0.75rem 0;"></div>

                <div id="audioSection" class="hidden" style="margin: 1rem 0;">
                    <button id="playAudioBtn">🔊 Play Sentence</button>
                </div>
            </section>

            <section class="input-section">
                <!-- Type Mode -->
                <div id="typeMode">
                    <input type="text" id="answerInput" placeholder="Type your answer...">
                    <button id="checkBtn" style="display: none;">Check Answer</button>
                </div>

                <!-- Choice Mode -->
                <div id="choiceMode">
                    <div id="options" class="choice-grid"></div>
                </div>

                <!-- Fuzzy Mode -->
                <div id="fuzzyMode">
                    <input type="text" id="fuzzyInput" placeholder="Type your answer...">
                    <div id="fuzzyOptions" class="choice-grid" style="margin-top: 0.75rem;"></div>
                </div>

                <!-- Study Mode -->
                <div id="studyMode">
                    <div style="text-align: center; color: #6b7280; margin-bottom: 1rem;">Click the speaker to replay any line. Use Study Mode to preview before dictation.</div>
                    <div id="studyList" style="max-height: 420px; overflow-y: auto;"></div>
                </div>

                <!-- Feedback -->
                <div id="feedback"></div>
            </section>

            <footer class="stats-bar" id="stats">
                <div>Score: <span id="score">0</span>/<span id="total">0</span></div>
                <div id="timerDisplay"></div>
                <div>Accuracy: <span id="accuracy">0%</span></div>
            </footer>
        </main>
    </div>

    <script>
        const dictationSentences = [
            { char: '这是什么？', pinyin: 'zhè shì shén.me', meaning: '甲: What is this?' },
            { char: '这是地图。', pinyin: 'zhè shì dì.tú', meaning: '乙: This is a map.' },
            { char: '这是什么地图？', pinyin: 'zhè shì shén.me dì.tú', meaning: '甲: What kind of map is this?' },
            { char: '这是中国地图。', pinyin: 'zhè shì Zhōng.guó dì.tú', meaning: '乙: This is a map of China.' },
            { char: '那么，那是什么地图呢？', pinyin: 'nà.me nà shì shén.me dì.tú ne', meaning: '甲: Then what map is that?' },
            { char: '那也是中国地图。', pinyin: 'nà yě shì Zhōng.guó dì.tú', meaning: '乙: That is also a map of China.' },
            { char: '为什么这两张中国地图不一样呢？', pinyin: 'wèishén.me zhè liǎng zhāng Zhōng.guó dì.tú bù yīyàng ne', meaning: '甲: Why are these two maps of China different?' },
            { char: '因为一张是中华民国地图；一张是中华人民共和国地图。', pinyin: 'yīn.wèi yī zhāng shì Zhōnghuá Mínguó dì.tú; yī zhāng shì Zhōnghuá Rénmín Gònghéguó dì.tú', meaning: '乙: Because one is the ROC map; one is the PRC map.' },
            { char: '中华民国的地图为什么比中华人民共和国的地图大一点儿呢？', pinyin: 'Zhōnghuá Mínguó de dì.tú wèishén.me bǐ Zhōnghuá Rénmín Gònghéguó de dì.tú dà yīdiǎnr ne', meaning: '甲: Why is the ROC map a little bigger than the PRC map?' },
            { char: '因为中华民国地图是1949年以前的中国，那时的地图还包括现在的蒙古国。', pinyin: 'yīn.wèi Zhōnghuá Mínguó dì.tú shì yī jiǔ sì jiǔ nián yǐqián de Zhōngguó, nà shí de dì.tú hái bāokuò xiànzài de Měnggǔguó', meaning: '乙: Because the ROC map shows pre-1949 China, which still included present-day Mongolia.' },
            { char: '哦，我懂了。中华民国的地图是历史上的中国，中华人民共和国的地图是现在的中国。', pinyin: 'ò, wǒ dǒng.le. Zhōnghuá Mínguó de dì.tú shì lìshǐ shàng de Zhōngguó, Zhōnghuá Rénmín Gònghéguó de dì.tú shì xiànzài de Zhōngguó', meaning: '甲: Oh, I get it. The ROC map is historical China; the PRC map is China today.' },
            { char: '对了，对了。可是中华民国也不完全是历史上的中国，他们1949年搬到台湾去了。', pinyin: 'duì.le, duì.le. kě.shì Zhōnghuá Mínguó yě bù wánquán shì lìshǐ shàng de Zhōngguó, tā.men yī jiǔ sì jiǔ nián bān dào Táiwān qù.le', meaning: '乙: Right, right. But the ROC is not entirely historical China—they moved to Taiwan in 1949.' },
            { char: '哦，台湾就是中华民国；中华民国就是台湾。', pinyin: 'ò, Táiwān jiù.shì Zhōnghuá Mínguó; Zhōnghuá Mínguó jiù.shì Táiwān', meaning: '甲: Oh, Taiwan is the ROC; the ROC is Taiwan.' },
            { char: '中国和台湾的政府都说只有一个中国，而台湾是中国的一部分。', pinyin: 'Zhōngguó hé Táiwān de zhèng.fǔ dōu shuō zhǐyǒu yī gè Zhōngguó, ér Táiwān shì Zhōngguó de yī bù.fèn', meaning: '乙: The governments of China and Taiwan both say there is only one China, and Taiwan is a part of China.' },
            { char: '可是，中国和台湾是两个国家，对不对？', pinyin: 'kě.shì, Zhōngguó hé Táiwān shì liǎng gè guójiā, duì.bu.duì', meaning: '甲: But China and Taiwan are two countries, right?' },
            { char: '这个……这个……很难说，很难说……', pinyin: 'zhè.ge zhè.ge hěn nán shuō, hěn nán shuō', meaning: '乙: That... that... is hard to say, hard to say.' }
        ];

        const paletteItems = [
            { name: 'Dictation: Audio → Pinyin', mode: 'audio-to-pinyin', type: 'mode' },
            { name: 'Dictation: Text → Pinyin', mode: 'char-to-pinyin', type: 'mode' },
            { name: 'Dictation: Audio → Meaning', mode: 'audio-to-meaning', type: 'mode' },
            { name: 'Dictation: Audio → Meaning (Chunks)', mode: 'audio-to-meaning-chunks', type: 'mode' },
            { name: 'Dictation: Text → Meaning', mode: 'text-to-meaning', type: 'mode' },
            { name: 'Dictation: Text → Meaning (Chunks)', mode: 'text-to-meaning-chunks', type: 'mode' },
            { name: 'Dictation: AI Chat', mode: 'dictation-chat', type: 'mode' },
            { name: 'Dictation: Study Mode', mode: 'study', type: 'mode' }
        ];

        initQuiz(dictationSentences, {
            defaultMode: 'audio-to-meaning',
            commandPaletteItems: paletteItems
        });
    </script>
</body>
</html>
