<!DOCTYPE html>
<html lang="zh-CN" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Character Sheet 4 Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <link rel="stylesheet" href="css/common.css">
    <script src="js/utils.js"></script>
    <script src="js/command-palette.js"></script>
    <script src="js/etymology-loader.js"></script>
    <script src="js/pinyin-utils.js"></script>
    <script src="js/engine/ai-service.js"></script>
    <script src="js/engine/chat.js"></script>
    <script src="js/quiz-engine.js"></script>
    <script src="js/eeg-bridge.js"></script>
    <script src="js/eeg-neuro.js"></script>
    <script src="js/eeg-decision.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-sync.js"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">
    <a href="home.html" class="fixed top-4 left-4 bg-white hover:bg-gray-100 text-gray-700 px-3 py-2 rounded-lg shadow border border-gray-200 transition text-sm">← Home</a>

    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-lg p-6 md:p-8 mt-16 md:mt-0">
        <h1 class="text-3xl font-bold text-center mb-6 text-gray-800">汉字练习-4 Quiz (Radicals)</h1>

        <!-- Mode Selector -->
        <div class="flex flex-wrap gap-2 justify-center mb-6">
                <button class="mode-btn px-3 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition text-left text-sm" data-mode="char-to-pinyin-type">Char → Pinyin (MC)</button>
                <button class="mode-btn px-3 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition text-left text-sm" data-mode="char-to-pinyin-tones-mc">Char → Pinyin (Tones MC)</button>
            <button class="mode-btn px-4 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition active:bg-blue-500 active:text-white active:border-blue-500" data-mode="char-to-pinyin">Char → Pinyin</button>
            <button class="mode-btn px-4 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition" data-mode="char-to-tones">Char → Tones</button>
            <button class="mode-btn px-4 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition" data-mode="audio-to-pinyin">Audio → Pinyin</button>
            <button class="mode-btn px-4 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition" data-mode="pinyin-to-char">Pinyin → Char</button>
            <button class="mode-btn px-4 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition" data-mode="char-to-meaning-type">Char → Meaning</button>
            <button class="mode-btn px-4 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition" data-mode="audio-to-meaning">Audio → Meaning</button>
            <button class="mode-btn px-4 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition" data-mode="meaning-to-char">Meaning → Char</button>
                <button class="mode-btn" data-mode="blend">🔀 Blend</button>
                <button class="mode-btn" data-mode="blend-mc">🔀 Blend MC</button>
            <button class="mode-btn px-4 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition" data-mode="stroke-order">Stroke Order</button>
            <button class="mode-btn px-4 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition" data-mode="handwriting">Handwriting</button>
            <button class="mode-btn px-4 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition" data-mode="draw-char">Draw Character</button>
            <button class="mode-btn px-4 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-100 transition" data-mode="study">Study Mode</button>
        </div>

        <!-- Upcoming Preview -->
        <div id="upcomingCharacters" class="hidden text-center mb-4">
            <div class="text-xs uppercase tracking-widest text-gray-400">Upcoming</div>
            <div class="preview-list flex justify-center gap-4 mt-2 text-4xl text-gray-300"></div>
        </div>

        <!-- Question Display -->
        <div id="questionDisplay" class="text-center"></div>

        <!-- Hint -->
        <div id="hint" class="text-center text-2xl font-semibold my-4"></div>

        <!-- Audio Section -->
        <div id="audioSection" class="text-center my-4 hidden">
            <button id="playAudioBtn" class="bg-cyan-500 hover:bg-cyan-600 text-white px-6 py-3 rounded-lg transition">🔊 Play Sound</button>
        </div>

        <!-- Type Mode -->
        <div id="typeMode" class="space-y-4">
            <input type="text" id="answerInput" class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none text-lg" placeholder="Type your answer...">
            <button id="checkBtn" class="w-full bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-lg font-semibold transition">Check Answer</button>
        </div>

        <!-- Choice Mode -->
        <div id="choiceMode" class="hidden">
            <div id="options" class="grid grid-cols-2 gap-3"></div>
        </div>

        <!-- Fuzzy Mode -->
        <div id="fuzzyMode" class="hidden space-y-4">
            <input type="text" id="fuzzyInput" class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none text-lg" placeholder="Type your answer...">
            <div id="fuzzyOptions" class="grid grid-cols-2 gap-3"></div>
        </div>

        <!-- Stroke Order Mode -->
        <div id="strokeOrderMode" class="hidden">
            <div id="strokeOrderWriter" class="flex justify-center my-8"></div>
        </div>

        <!-- Handwriting Mode -->
        <div id="handwritingMode" class="hidden">
            <div class="text-center text-gray-600 mb-4">Practice writing on paper, then reveal the answer</div>
            <div id="handwritingWriter" class="flex justify-center my-8"></div>
            <div class="flex justify-center gap-3">
                <button id="hwShowBtn" class="bg-blue-500 hover:bg-blue-600 text-white px-8 py-3 rounded-lg transition text-lg">Show Answer</button>
                <button id="hwNextBtn" class="bg-green-500 hover:bg-green-600 text-white px-8 py-3 rounded-lg transition text-lg">Next</button>
            </div>
                            <p id="hwSpaceHint" class="text-center text-sm text-gray-500 mt-2">Space: show → tap ✓ correct · hold ✗ wrong</p>
                </div>

        <!-- Draw Character Mode -->
        <div id="drawCharMode" class="hidden">
            <div class="text-center mb-4">
                <div id="ocrResult" class="text-6xl min-h-[80px] text-blue-600 font-bold"></div>
                <div class="text-sm text-gray-500">Real-time recognition</div>
            </div>
            <canvas id="drawCanvas" class="border-2 border-gray-300 rounded-lg mx-auto cursor-crosshair" width="300" height="300"></canvas>
            <div class="flex gap-3 justify-center mt-4">
                <button id="clearCanvasBtn" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-lg transition">🗑️ Clear</button>
                <button id="submitDrawBtn" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-lg transition">✓ Submit</button>
                <button id="fullscreenDrawBtn" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-lg transition">⛶ Fullscreen</button>
            </div>
        </div>

        <!-- Fullscreen Drawing Mode -->
        <div id="fullscreenDrawContainer" class="hidden fixed inset-0 bg-gray-100 z-50 flex flex-col">
            <div class="flex justify-between items-center p-4 bg-white shadow">
                <div class="text-2xl font-bold text-gray-700" id="fullscreenPrompt">Draw: </div>
                <div class="flex gap-3">
                    <button id="fullscreenUndoBtn" class="bg-gray-300 text-gray-500 px-6 py-2 rounded-lg transition cursor-not-allowed" disabled>↶ Undo</button>
                    <button id="fullscreenClearBtn" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-lg transition">🗑️ Clear</button>
                    <button id="fullscreenSubmitBtn" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-lg transition">✓ Submit</button>
                    <button id="fullscreenShowAnswerBtn" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-lg transition">💡 Show Answer</button>
                    <button id="fullscreenNextBtn" class="bg-purple-500 hover:bg-purple-600 text-white px-6 py-2 rounded-lg transition">→ Next</button>
                    <button id="fullscreenLearnBtn" class="bg-yellow-500 hover:bg-yellow-600 text-white px-6 py-2 rounded-lg transition">📚 Learn</button>
                    <button id="fullscreenLearnNextBtn" class="hidden bg-purple-500 hover:bg-purple-600 text-white px-6 py-2 rounded-lg transition">→ Next Char</button>
                    <button id="fullscreenLearnStopBtn" class="hidden bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-lg transition">■ Stop</button>
                    <button id="exitFullscreenBtn" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-2 rounded-lg transition">✕ Exit</button>
                </div>
            </div>
            <div class="flex-1 flex items-center justify-center p-8">
                <div class="text-center w-full">
                    <div id="fullscreenOcrResult" class="text-8xl min-h-[120px] text-blue-600 font-bold mb-4"></div>
                    <canvas id="fullscreenDrawCanvas" class="border-4 border-gray-400 rounded-lg cursor-crosshair bg-white shadow-lg" style="width: 90vmin; height: 90vmin; max-width: 800px; max-height: 800px;"></canvas>
                </div>
            </div>
        </div>

        <!-- Study Mode -->
        <div id="studyMode" class="hidden">
            <div class="text-center text-gray-600 mb-4">Study all characters with audio</div>
            <div id="studyList" class="space-y-2 max-h-[600px] overflow-y-auto"></div>
        </div>

        <!-- Feedback -->
        <div id="feedback" class="text-center text-2xl font-semibold my-4 min-h-[24px]"></div>

        <!-- Stats -->
        <div id="stats" class="flex justify-between text-sm text-gray-600 pt-4 border-t border-gray-200">
            <span>Score: <span id="score" class="font-semibold">0</span>/<span id="total" class="font-semibold">0</span></span>
            <span>Accuracy: <span id="accuracy" class="font-semibold">0%</span></span>
        </div>
    </div>

    <script>
        const characters = [
            // Full characters
            { char: '女', pinyin: 'nǚ', meaning: 'woman' },
            { char: '人', pinyin: 'rén', meaning: 'people' },
            { char: '刀', pinyin: 'dāo', meaning: 'knife' },
            { char: '口', pinyin: 'kǒu', meaning: 'mouth' },
            { char: '手', pinyin: 'shǒu', meaning: 'hand' },
            { char: '心', pinyin: 'xīn', meaning: 'heart' },
            { char: '水', pinyin: 'shuǐ', meaning: 'water' },
            { char: '火', pinyin: 'huǒ', meaning: 'fire' },
            { char: '木', pinyin: 'mù', meaning: 'tree' },
            { char: '衣', pinyin: 'yī', meaning: 'cloth' },
            { char: '金', pinyin: 'jīn', meaning: 'metal' },
            { char: '言', pinyin: 'yán', meaning: 'speech' },
            { char: '宝', pinyin: 'bǎo', meaning: 'treasure/roof' },
            { char: '足', pinyin: 'zú', meaning: 'foot' },
            { char: '竹', pinyin: 'zhú', meaning: 'bamboo' },
            { char: '丝', pinyin: 'sī', meaning: 'silk' },
            { char: '食', pinyin: 'shí', meaning: 'food' },
            { char: '禾', pinyin: 'hé', meaning: 'crop' },
            { char: '狗', pinyin: 'gǒu', meaning: 'dog' },
            { char: '道', pinyin: 'dào', meaning: 'road/way' },

            // Radical forms
            { char: '亻', pinyin: 'dānrén páng', meaning: 'people radical' },
            { char: '刂', pinyin: 'lìdāo páng', meaning: 'knife radical' },
            { char: '扌', pinyin: 'tíshǒu páng', meaning: 'hand radical' },
            { char: '忄', pinyin: 'shùxīn páng', meaning: 'heart radical' },
            { char: '氵', pinyin: 'sāndiǎn shuǐ', meaning: 'water radical' },
            { char: '灬', pinyin: 'huǒzì dǐ', meaning: 'fire radical' },
            { char: '衤', pinyin: 'yīzì páng', meaning: 'cloth radical' },
            { char: '钅', pinyin: 'jīnzì páng', meaning: 'metal radical' },
            { char: '讠', pinyin: 'yánzì páng', meaning: 'speech radical' },
            { char: '宀', pinyin: 'bǎogài tóu', meaning: 'roof radical' },
            { char: '纟', pinyin: 'jiǎosī páng', meaning: 'silk radical' },
            { char: '饣', pinyin: 'shízì páng', meaning: 'food radical' },
            { char: '犭', pinyin: 'quǎn yóu páng', meaning: 'dog/animal radical' },
            { char: '辶', pinyin: 'zǒuzhī páng', meaning: 'walking radical' }
        ];

        // Initialize the quiz with the modular engine
        initQuiz(characters, {
            enablePreviewQueue: true,
            previewQueueSize: 4,
            previewElementId: 'upcomingCharacters',
            previewApplicableModes: ['char-to-meaning-type', 'char-to-meaning', 'audio-to-meaning']
        });
    </script>
</body>
</html>
